services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: companion
      POSTGRES_PASSWORD: companion
      POSTGRES_DB: companion
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companion -d companion"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8001:8000"
    env_file:
      - .env.prod
    environment:
      IN_DOCKER: "1"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  worker:
    build: .
    env_file:
      - .env.prod
    environment:
      IN_DOCKER: "1"
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/app/scripts/docker-entrypoint-worker.sh"]
    command: python scripts/run_worker.py
    restart: unless-stopped

volumes:
  postgres_data_prod:
