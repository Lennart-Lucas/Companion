services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: companion
      POSTGRES_PASSWORD: companion
      POSTGRES_DB: companion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companion -d companion"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/app/scripts/docker-entrypoint-dev.sh"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic

  worker:
    build: .
    env_file:
      - .env.dev
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    entrypoint: ["/bin/sh", "/app/scripts/docker-entrypoint-worker.sh"]
    command: ["python", "scripts/run_worker.py"]
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic

volumes:
  postgres_data_dev:
